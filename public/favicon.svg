<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0D2240"/>
  <rect x="16" y="16" width="480" height="480" rx="68" fill="#0D2240" stroke="#C9A961" stroke-width="4"/>
  <!-- Card shape -->
  <rect x="96" y="72" width="200" height="280" rx="16" fill="#F8F1E3"/>
  <rect x="96" y="72" width="200" height="280" rx="16" fill="none" stroke="#9C1E1E" stroke-width="3"/>
  <!-- Heart suit -->
  <text x="118" y="130" font-family="Georgia,serif" font-size="42" fill="#9C1E1E">A</text>
  <text x="118" y="170" font-family="Georgia,serif" font-size="28" fill="#9C1E1E">♥</text>
  <!-- Center heart -->
  <text x="196" y="250" font-family="Georgia,serif" font-size="72" fill="#9C1E1E" text-anchor="middle" dominant-baseline="central">♥</text>
  <!-- Bottom-right copy -->
  <text x="274" y="320" font-family="Georgia,serif" font-size="42" fill="#9C1E1E" transform="rotate(180,274,320)">A</text>
  <!-- Gold accent bar -->
  <rect x="320" y="160" width="4" height="240" rx="2" fill="#C9A961"/>
  <!-- "DOC'S" text -->
  <text x="340" y="220" font-family="Georgia,serif" font-size="32" fill="#C9A961" font-weight="bold">DOC'S</text>
  <!-- "CARDS" text -->
  <text x="340" y="260" font-family="Georgia,serif" font-size="28" fill="#E8D5A3" font-weight="bold">CARDS</text>
  <!-- Decorative line -->
  <line x1="326" y1="280" x2="460" y2="280" stroke="#C9A961" stroke-width="1.5"/>
  <!-- Navy star -->
  <text x="396" y="320" font-family="Georgia,serif" font-size="26" fill="#0D2240" text-anchor="middle">★</text>
</svg>