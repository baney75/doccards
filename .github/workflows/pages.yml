name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Site is published from the gh-pages branch
# (Settings → Pages → Deploy from a branch → gh-pages / root).
# Do NOT switch Source to "GitHub Actions" or re-add actions/deploy-pages
# unless the github-pages environment allows branch "master" — otherwise
# deploy fails with: Branch "master" is not allowed to deploy to github-pages.
# Live URL (project site): https://baney75.github.io/doccards/
# User-site root https://baney75.github.io/ needs repo rename to baney75.github.io.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run pages:build

      - name: Verify publish artifact
        run: |
          test -f _site/index.html
          test -f _site/sw.js
          test -f _site/manifest.json
          test -f _site/.nojekyll
          grep -q "var CACHE_NAME = 'doccards-v" _site/sw.js
          echo "Artifact OK: $(grep -o "doccards-v[0-9]*" _site/sw.js | head -1)"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          force_orphan: true
          enable_jekyll: false
